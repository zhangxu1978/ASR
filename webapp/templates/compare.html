<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歌词对比 - Qwen3-ASR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: #888;
            font-size: 1.1em;
        }
        
        /* 格式选择 */
        .format-selector {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .format-title {
            font-size: 1.1em;
            margin-bottom: 15px;
            color: #00d4ff;
        }
        
        .format-options {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .format-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .format-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .format-btn.active {
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            border-color: #00d4ff;
        }
        
        /* 播放器区域 */
        .player-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .audio-player {
            width: 100%;
            max-width: 800px;
            margin: 0 auto 20px;
        }
        
        .audio-player::-webkit-media-controls-panel {
            background: rgba(255, 255, 255, 0.1);
        }
        
        /* 对比容器 */
        .compare-container {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .track-section {
            flex: 1;
            min-width: 300px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
        }
        
        .track-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .track-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #00d4ff;
        }
        
        /* 歌词显示 */
        .lyrics-container {
            position: relative;
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }
        
        .lyrics-line {
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 8px;
            transition: all 0.3s;
            cursor: pointer;
            color: #888;
            border: 1px solid transparent;
        }
        
        .lyrics-line:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        .lyrics-line.active {
            background: linear-gradient(90deg, rgba(0, 212, 255, 0.2), rgba(124, 58, 237, 0.2));
            color: #fff;
            transform: scale(1.02);
            font-weight: bold;
            border-color: #00d4ff;
        }
        
        .lyrics-line .time {
            font-size: 0.8em;
            color: #666;
            margin-right: 10px;
        }
        
        .lyrics-line.active .time {
            color: #00d4ff;
        }
        
        .lyrics-line.editing {
            background: rgba(255, 255, 0, 0.1);
            border-color: #ffeb3b;
        }
        
        .lyrics-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #00d4ff;
            border-radius: 6px;
            padding: 8px 12px;
            color: #fff;
            font-family: inherit;
            font-size: 1em;
        }
        
        .lyrics-input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.3);
        }
        
        /* 控制按钮 */
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        /* 滚动条样式 */
        .lyrics-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .lyrics-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        
        .lyrics-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            
            .compare-container {
                flex-direction: column;
            }
            
            .track-section {
                min-width: 100%;
            }
            
            .lyrics-container {
                height: 300px;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
        
        /* 加载动画 */
        @keyframes pulse {
            0% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0.6;
            }
        }
        
        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        /* 按钮悬停效果增强 */
        .btn {
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        /* 歌词输入框焦点效果 */
        .lyrics-input {
            transition: all 0.3s;
        }
        
        .lyrics-input:focus {
            transform: scale(1.02);
        }
        
        /* 平滑滚动 */
        .lyrics-container {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 歌词对比</h1>
            <p class="subtitle">AI校对歌词与ASR识别歌词对比</p>
        </header>
        
        <!-- 格式选择 -->
        <div class="format-selector">
            <div class="format-title">📋 格式选择</div>
            <div class="format-options">
                <button class="format-btn active" onclick="selectFormat('srt')">SRT格式</button>
                <button class="format-btn" onclick="selectFormat('lrc')">LRC格式</button>
            </div>
        </div>
        
        <!-- 播放器 -->
        <div class="player-section">
            <audio id="player" class="audio-player" controls></audio>
        </div>
        
        <!-- 双轨对比 -->
        <div class="compare-container">
            <!-- AI校对歌词轨道 -->
            <div class="track-section">
                <div class="track-header">
                    <div class="track-title">✨ AI校对歌词</div>
                    <div class="controls">
                        <button class="btn btn-secondary" onclick="loadAILyrics()">
                            📄 加载
                        </button>
                    </div>
                </div>
                
                <div class="lyrics-container" id="aiLyricsContainer">
                    <div style="text-align: center; color: #888; margin-top: 150px;">加载AI校对歌词...</div>
                </div>
            </div>
            
            <!-- ASR识别歌词轨道 -->
            <div class="track-section">
                <div class="track-header">
                    <div class="track-title">🎤 ASR识别歌词</div>
                    <div class="controls">
                        <button class="btn btn-secondary" onclick="loadASRLyrics()">
                            📄 加载
                        </button>
                        <button class="btn btn-primary" onclick="saveASRLyrics()">
                            💾 保存
                        </button>
                    </div>
                </div>
                
                <div class="lyrics-container" id="asrLyricsContainer">
                    <div style="text-align: center; color: #888; margin-top: 150px;">加载ASR识别歌词...</div>
                </div>
            </div>
        </div>
        
        <!-- 操作按钮 -->
        <div class="controls" style="justify-content: center;">
            <button class="btn btn-secondary" onclick="window.close()">
                🚪 关闭
            </button>
        </div>
    </div>
    
    <script>
        // 全局变量
        let fileId = '';
        let currentFormat = 'srt';
        let aiLyrics = [];
        let asrLyrics = [];
        
        // 获取URL参数
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        // 初始化
        window.onload = function() {
            fileId = getUrlParam('file_id') || window.location.pathname.split('/').pop();
            if (fileId) {
                loadFileInfo();
            } else {
                alert('请从文件列表页面进入');
                window.close();
            }
        };
        
        // 加载文件信息
        async function loadFileInfo() {
            try {
                const response = await fetch(`/api/files`);
                const data = await response.json();
                
                if (data.success) {
                    const file = data.files.find(f => f.id === fileId);
                    if (file) {
                        // 设置音频播放器
                        const player = document.getElementById('player');
                        player.src = `/api/audio/${fileId}`;
                        
                        // 加载歌词
                        await loadAILyrics();
                        await loadASRLyrics();
                        
                        // 监听播放器时间更新
                        player.addEventListener('timeupdate', updateLyricsHighlight);
                    } else {
                        alert('文件不存在');
                        window.close();
                    }
                }
            } catch (error) {
                console.error('加载文件信息失败:', error);
                alert('加载失败，请重试');
            }
        }
        
        // 选择格式
        function selectFormat(format) {
            currentFormat = format;
            
            // 更新按钮状态
            document.querySelectorAll('.format-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 重新加载歌词
            loadAILyrics();
            loadASRLyrics();
        }
        
        // 加载AI校对歌词
        async function loadAILyrics() {
            try {
                const response = await fetch(`/api/files`);
                const data = await response.json();
                
                if (data.success) {
                    const file = data.files.find(f => f.id === fileId);
                    if (file) {
                        let lyricsFile = null;
                        if (currentFormat === 'srt') {
                            lyricsFile = file.ai_corrected_srt || file.srt_lyrics;
                        } else {
                            lyricsFile = file.ai_corrected_lrc || file.lrc_lyrics;
                        }
                        
                        if (lyricsFile) {
                            const lyricsResponse = await fetch(`/download/${lyricsFile}`);
                            const lyricsText = await lyricsResponse.text();
                            
                            if (currentFormat === 'srt') {
                                aiLyrics = parseSRT(lyricsText);
                            } else {
                                aiLyrics = parseLRC(lyricsText);
                            }
                            
                            renderLyrics('aiLyricsContainer', aiLyrics, false);
                        } else {
                            aiLyrics = [];
                            renderLyrics('aiLyricsContainer', aiLyrics, false);
                        }
                    }
                }
            } catch (error) {
                console.error('加载AI校对歌词失败:', error);
            }
        }
        
        // 加载ASR识别歌词
        async function loadASRLyrics() {
            try {
                const response = await fetch(`/api/files`);
                const data = await response.json();
                
                if (data.success) {
                    const file = data.files.find(f => f.id === fileId);
                    if (file) {
                        let lyricsFile = null;
                        if (currentFormat === 'srt') {
                            lyricsFile = file.srt_lyrics;
                        } else {
                            lyricsFile = file.lrc_lyrics;
                        }
                        
                        if (lyricsFile) {
                            const lyricsResponse = await fetch(`/download/${lyricsFile}`);
                            const lyricsText = await lyricsResponse.text();
                            
                            if (currentFormat === 'srt') {
                                asrLyrics = parseSRT(lyricsText);
                            } else {
                                asrLyrics = parseLRC(lyricsText);
                            }
                            
                            renderLyrics('asrLyricsContainer', asrLyrics, true);
                        } else {
                            asrLyrics = [];
                            renderLyrics('asrLyricsContainer', asrLyrics, true);
                        }
                    }
                }
            } catch (error) {
                console.error('加载ASR识别歌词失败:', error);
            }
        }
        
        // 解析SRT格式歌词
        function parseSRT(text) {
            const lines = text.trim().split('\n');
            const lyrics = [];
            let currentLine = {
                id: '',
                startTime: 0,
                endTime: 0,
                text: ''
            };
            
            for (const line of lines) {
                if (line.trim() === '') {
                    if (currentLine.text) {
                        lyrics.push(currentLine);
                        currentLine = {
                            id: '',
                            startTime: 0,
                            endTime: 0,
                            text: ''
                        };
                    }
                } else if (!currentLine.id) {
                    currentLine.id = line.trim();
                } else if (!currentLine.startTime) {
                    const timeMatch = line.match(/(\d+:\d+:\d+,\d+) --> (\d+:\d+:\d+,\d+)/);
                    if (timeMatch) {
                        currentLine.startTime = timeToSeconds(timeMatch[1]);
                        currentLine.endTime = timeToSeconds(timeMatch[2]);
                    }
                } else {
                    currentLine.text += line + '\n';
                }
            }
            
            if (currentLine.text) {
                lyrics.push(currentLine);
            }
            
            return lyrics;
        }
        
        // 解析LRC格式歌词
        function parseLRC(text) {
            const lines = text.trim().split('\n');
            const lyrics = [];
            
            for (const line of lines) {
                const timeMatch = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                if (timeMatch) {
                    const minutes = parseInt(timeMatch[1]);
                    const seconds = parseFloat(timeMatch[2]);
                    const startTime = minutes * 60 + seconds;
                    const text = timeMatch[3].trim();
                    
                    lyrics.push({
                        id: lyrics.length + 1,
                        startTime: startTime,
                        endTime: startTime + 5, // LRC没有结束时间，默认5秒
                        text: text + '\n'
                    });
                }
            }
            
            // 为LRC设置结束时间
            for (let i = 0; i < lyrics.length - 1; i++) {
                lyrics[i].endTime = lyrics[i + 1].startTime;
            }
            
            return lyrics;
        }
        
        // 时间转换为秒
        function timeToSeconds(timeStr) {
            const parts = timeStr.split(/[:,]/);
            const hours = parseInt(parts[0]);
            const minutes = parseInt(parts[1]);
            const seconds = parseInt(parts[2]);
            const milliseconds = parseInt(parts[3]);
            return hours * 3600 + minutes * 60 + seconds + milliseconds / 1000;
        }
        
        // 秒转换为SRT时间格式
        function secondsToTime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            const milliseconds = Math.floor((seconds % 1) * 1000);
            return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')},${milliseconds.toString().padStart(3, '0')}`;
        }
        
        // 秒转换为LRC时间格式
        function secondsToLRC(seconds) {
            const minutes = Math.floor(seconds / 60);
            const secs = (seconds % 60).toFixed(2);
            return `${minutes}:${secs.padStart(5, '0')}`;
        }
        
        // 渲染歌词
        function renderLyrics(containerId, lyrics, editable) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            if (lyrics.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #888; margin-top: 150px;">暂无歌词</div>';
                return;
            }
            
            lyrics.forEach((line, index) => {
                const div = document.createElement('div');
                div.className = 'lyrics-line';
                div.dataset.start = line.startTime;
                div.dataset.end = line.endTime;
                div.dataset.index = index;
                
                if (editable) {
                    div.innerHTML = `
                        <span class="time">[${formatTime(line.startTime)}]</span>
                        <input type="text" class="lyrics-input" value="${line.text.trim()}" onblur="updateLyricsLine(${index}, this.value)" />
                    `;
                } else {
                    div.innerHTML = `
                        <span class="time">[${formatTime(line.startTime)}]</span>
                        ${line.text.trim()}
                    `;
                }
                
                // 点击跳转到对应时间
                div.addEventListener('click', (function(startTime) {
                    return function() {
                        const player = document.getElementById('player');
                        player.currentTime = startTime;
                        player.play();
                    };
                })(line.startTime));

                
                container.appendChild(div);
            });
        }
        
        // 格式化时间
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        // 更新歌词行
        function updateLyricsLine(index, text) {
            if (index >= 0 && index < asrLyrics.length) {
                asrLyrics[index].text = text + '\n';
            }
        }
        
        // 更新歌词高亮
        function updateLyricsHighlight() {
            const player = document.getElementById('player');
            const currentTime = player.currentTime;
            
            // 更新AI校对歌词高亮
            updateTrackHighlight('aiLyricsContainer', currentTime);
            
            // 更新ASR识别歌词高亮
            updateTrackHighlight('asrLyricsContainer', currentTime);
        }
        
        // 更新单个轨道的歌词高亮
        function updateTrackHighlight(containerId, currentTime) {
            const container = document.getElementById(containerId);
            const lines = container.querySelectorAll('.lyrics-line');
            
            lines.forEach(line => {
                const start = parseFloat(line.dataset.start);
                const end = parseFloat(line.dataset.end);
                
                if (currentTime >= start && currentTime <= end) {
                    line.classList.add('active');
                } else {
                    line.classList.remove('active');
                }
            });
        }
        
        // 保存ASR识别歌词
        async function saveASRLyrics() {
            let lyricsContent = '';
            
            if (currentFormat === 'srt') {
                // 生成SRT格式
                asrLyrics.forEach((line, index) => {
                    lyricsContent += `${index + 1}\n`;
                    lyricsContent += `${secondsToTime(line.startTime)} --> ${secondsToTime(line.endTime)}\n`;
                    lyricsContent += `${line.text}\n\n`;
                });
            } else {
                // 生成LRC格式
                asrLyrics.forEach(line => {
                    lyricsContent += `[${secondsToLRC(line.startTime)}]${line.text.trim()}\n`;
                });
            }
            
            try {
                // 发送到后端保存
                const response = await fetch(`/api/save-lyrics/${fileId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        content: lyricsContent,
                        format: currentFormat
                    })
                });
                
                const result = await response.json();
                if (result.success) {
                    alert('ASR识别歌词保存成功！');
                } else {
                    alert(`保存失败: ${result.message || '未知错误'}`);
                }
            } catch (error) {
                console.error('保存歌词失败:', error);
                alert('保存失败，请重试');
            }
        }
    </script>
</body>
</html>
