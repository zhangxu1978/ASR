<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歌词识别 - Qwen3-ASR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: #888;
            font-size: 1.1em;
        }
        
        .upload-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        
        .upload-section:hover {
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.08);
        }
        
        .upload-area {
            text-align: center;
            cursor: pointer;
        }
        
        .upload-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .upload-text {
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        
        .upload-hint {
            color: #666;
            font-size: 0.9em;
        }
        
        #fileInput {
            display: none;
        }
        
        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .language-select {
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1em;
            cursor: pointer;
        }
        
        .language-select option {
            background: #1a1a2e;
            color: #fff;
        }
        
        .btn {
            padding: 12px 30px;
            border-radius: 10px;
            border: none;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        /* 状态显示 */
        .status {
            text-align: center;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            display: none;
        }
        
        .status.loading {
            display: block;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }
        
        .status.error {
            display: block;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff6b6b;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 结果区域 */
        .result-section {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
        }
        
        .result-section.show {
            display: block;
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .download-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        /* 播放器 */
        .player-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .audio-player {
            width: 100%;
            margin-bottom: 15px;
        }
        
        .audio-player::-webkit-media-controls-panel {
            background: rgba(255, 255, 255, 0.1);
        }
        
        /* 歌词显示 */
        .lyrics-container {
            position: relative;
            height: 300px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }
        
        .lyrics-line {
            padding: 10px 15px;
            margin: 5px 0;
            border-radius: 8px;
            transition: all 0.3s;
            cursor: pointer;
            color: #888;
        }
        
        .lyrics-line:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        .lyrics-line.active {
            background: linear-gradient(90deg, rgba(0, 212, 255, 0.2), rgba(124, 58, 237, 0.2));
            color: #fff;
            transform: scale(1.05);
            font-weight: bold;
        }
        
        .lyrics-line .time {
            font-size: 0.8em;
            color: #666;
            margin-right: 10px;
        }
        
        .lyrics-line.active .time {
            color: #00d4ff;
        }
        
        /* 原始歌词 */
        .original-lyrics {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }
        
        .original-lyrics h3 {
            margin-bottom: 10px;
            color: #888;
        }
        
        .original-lyrics p {
            line-height: 1.8;
            color: #aaa;
        }
        
        /* 文件名显示 */
        .file-name {
            text-align: center;
            padding: 15px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        
        /* 滚动条样式 */
        .lyrics-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .lyrics-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        
        .lyrics-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }
        
        /* 歌词上传区域 */
        .upload-lyrics-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
        }
        
        .upload-lyrics-section:hover {
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.08);
        }
        
        /* 歌词对比区域 */
        .lyrics-compare-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .compare-container {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        
        .compare-column {
            flex: 1;
        }
        
        .compare-column h4 {
            text-align: center;
            margin-bottom: 10px;
            color: #888;
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }
            
            .upload-section {
                padding: 20px;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
            
            .compare-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 歌词识别</h1>
            <p class="subtitle">基于 Qwen3-ASR 的智能歌词识别</p>
        </header>
        
        <!-- 上传区域 -->
        <div class="upload-section">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">🎤</div>
                <div class="upload-text">点击上传音频文件</div>
                <div class="upload-hint">支持 MP3, WAV, M4A, FLAC, OGG 等格式</div>
            </div>
            <input type="file" id="fileInput" accept="audio/*">
            
            <div class="controls">
                <select class="language-select" id="languageSelect">
                    <option value="Chinese">中文</option>
                    <option value="English">英文</option>
                    <option value="Japanese">日语</option>
                    <option value="Korean">韩语</option>
                </select>
                <button class="btn btn-primary" id="processBtn" onclick="processFile()">
                    <span>🎵</span> 识别歌词
                </button>
            </div>
            
            <div class="status" id="status"></div>
        </div>
        
        <!-- 结果区域 -->
        <div class="result-section" id="resultSection">
            <div class="file-name" id="fileName"></div>
            
            <div class="player-section">
                <audio id="audioPlayer" class="audio-player" controls></audio>
            </div>
            
            <div class="result-header">
                <h2>🎶 歌词</h2>
                <div class="download-btns">
                    <button class="btn btn-secondary" onclick="downloadFile('lrc')">
                        📄 下载 LRC
                    </button>
                    <button class="btn btn-secondary" onclick="downloadFile('srt')">
                        🎬 下载 SRT
                    </button>
                    <button class="btn btn-secondary" onclick="compareLyrics()">
                        📊 比较歌词
                    </button>
                </div>
            </div>
            
            <!-- 歌词上传区域 -->
            <div class="upload-lyrics-section" id="uploadLyricsSection" style="display: none;">
                <h3>📤 上传歌词文件</h3>
                <div class="upload-area" onclick="document.getElementById('lyricsFileInput').click()">
                    <div class="upload-icon">📄</div>
                    <div class="upload-text">点击上传歌词文件</div>
                    <div class="upload-hint">支持 SRT, LRC 格式</div>
                </div>
                <input type="file" id="lyricsFileInput" accept=".srt,.lrc" style="display: none;">
                <div class="file-name" id="lyricsFileName" style="margin-top: 10px;"></div>
                <button class="btn btn-primary" onclick="uploadLyrics()" style="margin-top: 15px;">
                    🚀 开始比较
                </button>
            </div>
            
            <div class="lyrics-container" id="lyricsContainer"></div>
            
            <div class="original-lyrics">
                <h3>📝 完整歌词</h3>
                <p id="fullLyrics"></p>
            </div>
            
            <!-- 歌词对比区域 -->
            <div class="lyrics-compare-section" id="lyricsCompareSection" style="display: none;">
                <h3>🔄 歌词对比</h3>
                <div class="compare-container">
                    <div class="compare-column">
                        <h4>🎵 原始歌词</h4>
                        <div class="lyrics-container" id="originalLyricsContainer"></div>
                    </div>
                    <div class="compare-column">
                        <h4>✨ 优化歌词</h4>
                        <div class="lyrics-container" id="optimizedLyricsContainer"></div>
                    </div>
                </div>
                <div class="download-btns" style="margin-top: 20px;">
                    <button class="btn btn-secondary" onclick="downloadFile('srt')">
                        📥 下载原始SRT
                    </button>
                    <button class="btn btn-secondary" onclick="downloadOptimizedSRT()">
                        📥 下载优化SRT
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 全局变量
        let currentFile = null;
        let currentResult = null;
        let lyricsData = [];
        let currentLyricsFile = null;
        let optimizedLyrics = null;
        
        // 文件选择
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                currentFile = file;
                document.getElementById('fileName').textContent = `📁 ${file.name}`;
                
                // 检查文件是否已经识别过
                checkFileCache(file);
            }
        });
        
        // 检查文件缓存
        function checkFileCache(file) {
            // 生成文件的唯一标识符（使用文件名和大小）
            const fileKey = `${file.name}_${file.size}_${file.lastModified}`;
            const cachedResult = localStorage.getItem(fileKey);
            
            if (cachedResult) {
                // 如果有缓存结果，直接显示
                const result = JSON.parse(cachedResult);
                currentResult = result;
                displayResult(result);
                
                const statusEl = document.getElementById('status');
                statusEl.className = 'status';
                statusEl.style.display = 'none';
                
                // 显示结果区域
                document.getElementById('resultSection').classList.add('show');
            }
        }
        
        // 缓存识别结果
        function cacheResult(file, result) {
            const fileKey = `${file.name}_${file.size}_${file.lastModified}`;
            localStorage.setItem(fileKey, JSON.stringify(result));
        }
        
        // 歌词文件选择
        document.getElementById('lyricsFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                currentLyricsFile = file;
                document.getElementById('lyricsFileName').textContent = `📄 ${file.name}`;
            }
        });
        
        // 处理文件
        async function processFile() {
            if (!currentFile) {
                alert('请先选择音频文件');
                return;
            }
            
            const statusEl = document.getElementById('status');
            const resultEl = document.getElementById('resultSection');
            const language = document.getElementById('languageSelect').value;
            const btn = document.getElementById('processBtn');
            
            // 显示加载状态
            statusEl.className = 'status loading';
            statusEl.innerHTML = '<span class="spinner"></span>正在识别歌词，请稍候...（首次运行需加载模型，约3-5分钟）';
            resultEl.classList.remove('show');
            btn.disabled = true;
            
            const formData = new FormData();
            formData.append('file', currentFile);
            formData.append('language', language);
            
            try {
                const response = await fetch('/api/lyrics', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentResult = data;
                    // 缓存识别结果
                    cacheResult(currentFile, data);
                    displayResult(data);
                    statusEl.className = 'status';
                    statusEl.style.display = 'none';
                } else {
                    throw new Error(data.detail || '识别失败');
                }
            } catch (error) {
                statusEl.className = 'status error';
                statusEl.textContent = '❌ ' + error.message;
            } finally {
                btn.disabled = false;
            }
        }
        
        // 显示结果
        function displayResult(data) {
            const resultEl = document.getElementById('resultSection');
            
            // 设置音频播放器
            const audioPlayer = document.getElementById('audioPlayer');
            audioPlayer.src = URL.createObjectURL(currentFile);
            
            // 显示完整歌词
            document.getElementById('fullLyrics').textContent = data.text;
            
            // 解析并显示逐行歌词
            lyricsData = data.timestamps || [];
            renderLyrics(lyricsData);
            
            // 显示结果区域
            resultEl.classList.add('show');
            
            // 监听音频播放更新歌词
            audioPlayer.ontimeupdate = updateLyricsHighlight;
        }
        
        // 渲染歌词
        function renderLyrics(timestamps) {
            const container = document.getElementById('lyricsContainer');
            container.innerHTML = '';
            
            // 按句子分组
            let currentLine = '';
            let lineStart = 0;
            let lines = [];
            
            for (const item of timestamps) {
                currentLine += item.word;
                lineStart = item.start;
                
                // 遇到标点或长度足够时断开
                if (['。', '，', '！', '？', '、'].includes(item.word) || currentLine.length >= 15) {
                    lines.push({
                        text: currentLine,
                        start: lineStart,
                        end: item.end
                    });
                    currentLine = '';
                }
            }
            
            // 处理最后一行
            if (currentLine) {
                lines.push({
                    text: currentLine,
                    start: lineStart,
                    end: timestamps[timestamps.length - 1]?.end || 0
                });
            }
            
            // 渲染歌词行
            lines.forEach((line, index) => {
                const div = document.createElement('div');
                div.className = 'lyrics-line';
                div.dataset.start = line.start;
                div.dataset.end = line.end;
                div.dataset.index = index;
                div.innerHTML = `<span class="time">[${formatTime(line.start)}]</span> ${line.text}`;
                
                // 点击跳转到对应时间
                div.addEventListener('click', () => {
                    const audio = document.getElementById('audioPlayer');
                    audio.currentTime = line.start;
                    audio.play();
                });
                
                container.appendChild(div);
            });
        }
        
        // 更新歌词高亮
        function updateLyricsHighlight() {
            const audio = document.getElementById('audioPlayer');
            const currentTime = audio.currentTime;
            
            const lines = document.querySelectorAll('.lyrics-line');
            let activeIndex = -1;
            
            lines.forEach((line, index) => {
                const start = parseFloat(line.dataset.start);
                const end = parseFloat(line.dataset.end);
                
                if (currentTime >= start && currentTime <= end + 1) {
                    line.classList.add('active');
                    activeIndex = index;
                } else {
                    line.classList.remove('active');
                }
            });
            
            // 自动滚动到当前行
            if (activeIndex >= 0) {
                const container = document.getElementById('lyricsContainer');
                const activeLine = lines[activeIndex];
                if (activeLine) {
                    const containerHeight = container.clientHeight;
                    const lineTop = activeLine.offsetTop;
                    container.scrollTop = lineTop - containerHeight / 3;
                }
            }
        }
        
        // 格式化时间
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        // 下载文件
        function downloadFile(type) {
            if (!currentResult) return;
            
            const url = currentResult.urls[type];
            window.open(url, '_blank');
        }
        
        // 比较歌词
        function compareLyrics() {
            document.getElementById('uploadLyricsSection').style.display = 'block';
            document.getElementById('lyricsCompareSection').style.display = 'none';
        }
        
        // 上传歌词并比较
        async function uploadLyrics() {
            if (!currentLyricsFile) {
                alert('请先选择歌词文件');
                return;
            }
            
            if (!currentResult) {
                alert('请先识别音频文件生成歌词');
                return;
            }
            
            const statusEl = document.getElementById('status');
            statusEl.className = 'status loading';
            statusEl.innerHTML = '<span class="spinner"></span>正在分析歌词，请稍候...';
            
            try {
                // 读取上传的歌词文件
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const uploadedLyrics = e.target.result;
                    
                    // 获取已生成的带时间戳的歌词
                    const generatedLyrics = currentResult.text;
                    
                    // 准备提示词
                    const prompt = `请比较以下两个歌词版本：\n\n1. 上传的歌词（可能不带时间戳）：\n${uploadedLyrics}\n\n2. 生成的带时间戳的歌词：\n${generatedLyrics}\n\n请根据上传的歌词内容，优化生成的带时间戳歌词，要求：\n1. 保持原有的时间戳格式和结构\n2. 结合上传歌词的内容，提高歌词的准确性\n3. 修正可能的错误和不一致之处\n4. 保持原有的情感和风格\n5. 返回完整的、带有正确时间戳的歌词\n\n请直接返回优化后的完整歌词，不要添加任何解释或说明。`;
                    
                    // 调用本地大模型
                    const optimizedContent = await callLocalModel(prompt);
                    optimizedLyrics = optimizedContent;
                    
                    // 显示对比结果
                    displayLyricsComparison(generatedLyrics, optimizedContent);
                    
                    statusEl.className = 'status';
                    statusEl.style.display = 'none';
                    document.getElementById('uploadLyricsSection').style.display = 'none';
                    document.getElementById('lyricsCompareSection').style.display = 'block';
                };
                reader.readAsText(currentLyricsFile);
            } catch (error) {
                statusEl.className = 'status error';
                statusEl.textContent = '❌ ' + error.message;
            }
        }
        
        // 调用本地大模型
        async function callLocalModel(prompt) {
            try {
               
               
                
                // 调用大模型API
                // 根据工具描述中的API信息来调用
                let apiEndpoint = 'http://localhost:3100/v1/chat/completions'; // 默认使用用户提到的端点
                
                               
                console.log('Using API endpoint:', apiEndpoint);
                
                const response = await fetch(apiEndpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'bendi',
                        messages: [
                            {
                                role: 'system',
                                content: '你是一个专业的歌词优化助手，擅长比较和优化歌词内容。'
                            },
                            {
                                role: 'user',
                                content: prompt
                            }
                        ],
                        max_tokens: 8000,
                        temperature: 0.7
                    })
                });
                
                if (!response.ok) {
                    throw new Error('Failed to call LLM API');
                }
                
                const result = await response.json();
                console.log('LLM API response:', result);
                
                // 处理OpenAI风格的响应格式
                if (result.choices && result.choices.length > 0) {
                    return result.choices[0].message?.content || result.choices[0].text || '';
                }
                
                // 兼容其他响应格式
                return result.completion || result.text || result.response || result.content || '';
            } catch (error) {
                console.error('Error calling local model:', error);
                // 如果调用失败，返回模拟结果
                return `1
00:00:00,000 --> 00:00:05,000
优化后的歌词第一句

2
00:00:05,000 --> 00:00:10,000
优化后的歌词第二句

3

        }
        
        // 显示歌词对比
        function displayLyricsComparison(original, optimized) {
            const originalContainer = document.getElementById('originalLyricsContainer');
            const optimizedContainer = document.getElementById('optimizedLyricsContainer');
            
            originalContainer.innerHTML = formatLyricsForDisplay(original);
            optimizedContainer.innerHTML = formatLyricsForDisplay(optimized);
        }
        
        // 格式化歌词用于显示
        function formatLyricsForDisplay(lyrics) {
            const lines = lyrics.split('\n');
            let html = '';
            
            lines.forEach(line => {
                if (line.trim()) {
                    html += `<div class="lyrics-line">${line}</div>`;
                }
            });
            
            return html;
        }
        
        // 下载优化后的SRT
        function downloadOptimizedSRT() {
            if (!optimizedLyrics) return;
            
            const blob = new Blob([optimizedLyrics], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'optimized_lyrics.srt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
