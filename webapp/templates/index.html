<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歌词识别 - Qwen3-ASR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #888;
            font-size: 1.1em;
        }

        .upload-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .upload-section:hover {
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.08);
        }

        .upload-area {
            text-align: center;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #666;
            font-size: 0.9em;
        }

        #fileInput {
            display: none;
        }

        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .language-select {
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1em;
            cursor: pointer;
        }

        .language-select option {
            background: #1a1a2e;
            color: #fff;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 10px;
            border: none;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-success {
            background: linear-gradient(90deg, #10b981, #059669);
            color: #fff;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }

        .status {
            text-align: center;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            display: none;
        }

        .status.loading {
            display: block;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .status.error {
            display: block;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff6b6b;
        }

        .status.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-section {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
        }

        .result-section.show {
            display: block;
        }

        .file-name {
            text-align: center;
            padding: 15px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1.1em;
        }

        .player-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .audio-player {
            width: 100%;
        }

        .edit-toolbar {
            display: flex;
            gap: 10px;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .edit-toolbar h2 {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toolbar-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .lyrics-container {
            position: relative;
            max-height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .lyrics-line {
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 8px;
            transition: all 0.3s;
            cursor: pointer;
            color: #888;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .lyrics-line:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .lyrics-line.active {
            background: linear-gradient(90deg, rgba(0, 212, 255, 0.3), rgba(124, 58, 237, 0.3));
            color: #fff;
            transform: scale(1.02);
            font-weight: bold;
        }

        .lyrics-line .time {
            font-size: 0.85em;
            color: #666;
            min-width: 60px;
        }

        .lyrics-line.active .time {
            color: #00d4ff;
        }

        .lyrics-line .index {
            font-size: 0.8em;
            color: #555;
            min-width: 30px;
        }

        .lyrics-line.active .index {
            color: #00d4ff;
        }

        .lyrics-line .text {
            flex: 1;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid transparent;
            background: transparent;
            color: inherit;
            font-size: 1em;
            transition: all 0.2s;
        }

        .lyrics-line .text:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            color: #fff;
        }

        .lyrics-line .text:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .lyrics-line.editing .text {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }

        .lyrics-line .save-indicator {
            font-size: 0.75em;
            color: #10b981;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .lyrics-line .save-indicator.show {
            opacity: 1;
        }

        .lyrics-info {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-top: 15px;
            color: #888;
        }

        .lyrics-info strong {
            color: #00d4ff;
        }

        .scrollbar-container::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .scrollbar-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }

            .upload-section {
                padding: 20px;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .edit-toolbar {
                flex-direction: column;
                gap: 15px;
            }

            .toolbar-buttons {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 歌词识别</h1>
            <p class="subtitle">基于 Qwen3-ASR 的智能歌词识别 · 先校对后导出</p>
        </header>

        <div class="upload-section">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">🎤</div>
                <div class="upload-text">点击上传音频文件</div>
                <div class="upload-hint">支持 MP3, WAV, M4A, FLAC, OGG 等格式</div>
            </div>
            <input type="file" id="fileInput" accept="audio/*">

            <div class="controls">
                <button class="btn btn-primary" id="uploadBtn" onclick="uploadFile()">
                    <span>📤</span> 上传文件
                </button>
                <button class="btn btn-secondary" id="recognizeBtn" onclick="recognizeLyrics()" disabled>
                    <span>🎵</span> 识别歌词
                </button>
            </div>

            <div class="status" id="status"></div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="file-name" id="fileName"></div>

            <div class="player-section">
                <audio id="audioPlayer" class="audio-player" controls></audio>
            </div>

            <div class="edit-toolbar">
                <h2>📝 歌词校对</h2>
                <div class="toolbar-buttons">
                    <button class="btn btn-success" id="saveBtn" onclick="saveLyrics()" disabled>
                        <span>💾</span> 保存修改
                    </button>
                    <button class="btn btn-secondary" id="exportLrcBtn" onclick="exportLyrics('lrc')" disabled>
                        <span>📄</span> 导出LRC
                    </button>
                    <button class="btn btn-secondary" id="exportSrtBtn" onclick="exportLyrics('srt')" disabled>
                        <span>🎬</span> 导出SRT
                    </button>
                </div>
            </div>

            <div class="lyrics-container scrollbar-container" id="lyricsContainer"></div>

            <div class="lyrics-info" id="lyricsInfo">
                共 <strong id="totalLines">0</strong> 句歌词，已修改 <strong id="modifiedLines">0</strong> 处
            </div>
        </div>
    </div>

    <script>
        let currentFile = null;
        let currentFileId = null;
        let currentJsonUrl = null;
        let lyricsData = [];
        let modifiedCount = 0;
        let isModified = false;

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                currentFile = file;
                document.getElementById('fileName').textContent = `📁 ${file.name}`;
                document.getElementById('status').className = 'status';
                document.getElementById('status').style.display = 'none';
            }
        });

        async function uploadFile() {
            if (!currentFile) {
                alert('请先选择音频文件');
                return;
            }

            const statusEl = document.getElementById('status');
            const uploadBtn = document.getElementById('uploadBtn');
            const recognizeBtn = document.getElementById('recognizeBtn');

            statusEl.className = 'status loading';
            statusEl.innerHTML = '<span class="spinner"></span>正在上传文件...';
            statusEl.style.display = 'block';
            uploadBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', currentFile);

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    currentFileId = data.file_id;
                    statusEl.className = 'status success';
                    statusEl.textContent = '✅ 文件上传成功！点击"识别歌词"开始识别';
                    recognizeBtn.disabled = false;

                    document.getElementById('audioPlayer').src = URL.createObjectURL(currentFile);
                    document.getElementById('resultSection').classList.add('show');
                } else {
                    throw new Error(data.detail || '上传失败');
                }
            } catch (error) {
                statusEl.className = 'status error';
                statusEl.textContent = '❌ ' + error.message;
            } finally {
                uploadBtn.disabled = false;
            }
        }

        async function recognizeLyrics() {
            if (!currentFileId) {
                alert('请先上传文件');
                return;
            }

            const statusEl = document.getElementById('status');
            const recognizeBtn = document.getElementById('recognizeBtn');
            const saveBtn = document.getElementById('saveBtn');
            const exportLrcBtn = document.getElementById('exportLrcBtn');
            const exportSrtBtn = document.getElementById('exportSrtBtn');

            statusEl.className = 'status loading';
            statusEl.innerHTML = '<span class="spinner"></span>正在识别歌词，请稍候...（首次运行需加载模型，约3-5分钟）';
            recognizeBtn.disabled = true;

            try {
                const response = await fetch(`/api/lyrics-json/${currentFileId}`, {
                    method: 'POST'
                });

                if (!response.ok) {
                    throw new Error(`服务器错误: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();

                if (data.success) {
                    currentJsonUrl = data.json_url;
                    lyricsData = data.sentences || [];
                    modifiedCount = 0;
                    isModified = false;

                    renderLyrics(lyricsData);
                    updateLyricsInfo();

                    saveBtn.disabled = true;
                    exportLrcBtn.disabled = true;
                    exportSrtBtn.disabled = true;

                    statusEl.className = 'status success';
                    statusEl.textContent = '✅ 歌词识别成功！点击歌词可直接编辑';

                    document.getElementById('audioPlayer').ontimeupdate = updateLyricsHighlight;
                } else {
                    throw new Error(data.detail || '识别失败');
                }
            } catch (error) {
                statusEl.className = 'status error';
                statusEl.textContent = '❌ ' + error.message;
                console.error('识别歌词错误:', error);
                recognizeBtn.disabled = false;
            }
        }

        function renderLyrics(sentences) {
            const container = document.getElementById('lyricsContainer');
            container.innerHTML = '';

            sentences.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'lyrics-line';
                div.dataset.index = index;
                div.dataset.start = item.start;
                div.dataset.end = item.end;
                div.dataset.originalText = item.text;

                const timeStr = formatTime(item.start);

                div.innerHTML = `
                    <span class="index">${index + 1}</span>
                    <span class="time">[${timeStr}]</span>
                    <input type="text" class="text" value="${escapeHtml(item.text)}" />
                    <span class="save-indicator">✓ 已修改</span>
                `;

                const textInput = div.querySelector('.text');
                textInput.addEventListener('input', function() {
                    handleTextChange(div, index);
                });

                textInput.addEventListener('focus', function() {
                    div.classList.add('editing');
                });

                textInput.addEventListener('blur', function() {
                    div.classList.remove('editing');
                });

                div.addEventListener('click', function(e) {
                    if (e.target.tagName !== 'INPUT') {
                        const audio = document.getElementById('audioPlayer');
                        audio.currentTime = item.start;
                        audio.play();
                    }
                });

                container.appendChild(div);
            });
        }

        function handleTextChange(div, index) {
            const newText = div.querySelector('.text').value;
            const originalText = div.dataset.originalText;

            if (newText !== originalText) {
                div.querySelector('.save-indicator').classList.add('show');
                modifiedCount++;
                isModified = true;
            } else {
                div.querySelector('.save-indicator').classList.remove('show');
                const currentModified = document.querySelectorAll('.save-indicator.show').length;
                modifiedCount = currentModified;
                if (modifiedCount === 0) {
                    isModified = false;
                }
            }

            lyricsData[index].text = newText;
            updateLyricsInfo();
            document.getElementById('saveBtn').disabled = false;
        }

        function updateLyricsInfo() {
            document.getElementById('totalLines').textContent = lyricsData.length;
            document.getElementById('modifiedLines').textContent = modifiedCount;
        }

        function updateLyricsHighlight() {
            const audio = document.getElementById('audioPlayer');
            const currentTime = audio.currentTime;

            const lines = document.querySelectorAll('.lyrics-line');
            let activeIndex = -1;

            lines.forEach((line, index) => {
                const start = parseFloat(line.dataset.start);
                const end = parseFloat(line.dataset.end);

                if (currentTime >= start && currentTime <= end + 0.5) {
                    line.classList.add('active');
                    activeIndex = index;
                } else {
                    line.classList.remove('active');
                }
            });

            if (activeIndex >= 0) {
                const container = document.getElementById('lyricsContainer');
                const activeLine = lines[activeIndex];
                if (activeLine) {
                    const containerHeight = container.clientHeight;
                    const lineTop = activeLine.offsetTop;
                    container.scrollTop = lineTop - containerHeight / 3;
                }
            }
        }

        async function saveLyrics() {
            if (!currentFileId || !isModified) {
                return;
            }

            const statusEl = document.getElementById('status');
            const saveBtn = document.getElementById('saveBtn');

            statusEl.className = 'status loading';
            statusEl.innerHTML = '<span class="spinner"></span>正在保存歌词...';
            saveBtn.disabled = true;

            try {
                const response = await fetch(`/api/save-lyrics/${currentFileId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        lyrics: lyricsData
                    })
                });

                const data = await response.json();

                if (data.success) {
                    currentJsonUrl = data.json_url;

                    document.querySelectorAll('.save-indicator').forEach(el => {
                        el.classList.remove('show');
                    });

                    modifiedCount = 0;
                    isModified = false;

                    statusEl.className = 'status success';
                    statusEl.textContent = '✅ 歌词保存成功！可以继续编辑或导出';

                    document.getElementById('exportLrcBtn').disabled = false;
                    document.getElementById('exportSrtBtn').disabled = false;
                    updateLyricsInfo();
                } else {
                    throw new Error(data.detail || '保存失败');
                }
            } catch (error) {
                statusEl.className = 'status error';
                statusEl.textContent = '❌ ' + error.message;
                saveBtn.disabled = false;
            }
        }

        async function exportLyrics(format) {
            if (!currentFileId) {
                alert('请先识别歌词');
                return;
            }

            const statusEl = document.getElementById('status');

            if (isModified) {
                const saveFirst = confirm('检测到未保存的修改，是否先保存再导出？');
                if (saveFirst) {
                    await saveLyrics();
                    if (isModified) {
                        alert('保存失败，无法导出');
                        return;
                    }
                }
            }

            statusEl.className = 'status loading';
            statusEl.innerHTML = '<span class="spinner"></span>正在导出歌词...';

            try {
                const response = await fetch(`/api/export-lyrics/${currentFileId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        format: format
                    })
                });

                const data = await response.json();

                if (data.success) {
                    statusEl.className = 'status success';
                    statusEl.textContent = `✅ ${format.toUpperCase()}导出成功！`;
                    window.open(data.url, '_blank');
                } else {
                    throw new Error(data.detail || '导出失败');
                }
            } catch (error) {
                statusEl.className = 'status error';
                statusEl.textContent = '❌ ' + error.message;
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
